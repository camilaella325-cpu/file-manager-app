name: file_manager_app
description: A cross-platform file manager with dark mode, SD card support, and storage analysis.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Theme
  cupertino_icons: ^1.0.2
  google_fonts: ^6.0.0
  
  # File & Storage
  file_picker: ^6.0.0
  path_provider: ^2.1.1
  permission_handler: ^12.0.0
  
  # State Management
  provider: ^6.0.0
  
  # Utils
  intl: ^0.19.0
  
  # URL Launcher
  url_launcher: ^6.1.0
  
  # HTTP
  http: ^1.1.0
  
  # Share Plus
  share_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
